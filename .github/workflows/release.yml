name: Build & Release

on:
  push:
    tags:
      - 'v*'
      - 'alpha-*'
      - 'beta-*'
  workflow_dispatch:

jobs:
  build-flexbar-plugin:
    name: Build FlexBar plugin
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build plugin
        run: npm run build

      - name: Package .flexplugin
        run: |
          cd com.larvey.jetbrains.plugin
          zip -r ../com.larvey.jetbrains.flexplugin .

      - uses: actions/upload-artifact@v4
        with:
          name: flexbar-plugin
          path: com.larvey.jetbrains.flexplugin

  build-ide-plugin:
    name: Build IDE companion plugin
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - uses: gradle/actions/setup-gradle@v4
        with:
          gradle-home-cache-cleanup: true

      - name: Build plugin
        run: ./gradlew buildPlugin -PwsVersion=2025.3 --no-configuration-cache
        working-directory: webstorm-plugin

      - uses: actions/upload-artifact@v4
        with:
          name: ide-plugin
          path: webstorm-plugin/build/distributions/*.zip

  release:
    name: Create GitHub Release
    needs: [build-flexbar-plugin, build-ide-plugin]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: flexbar-plugin

      - uses: actions/download-artifact@v4
        with:
          name: ide-plugin

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          prerelease: ${{ !startsWith(github.ref_name, 'v') }}
          files: |
            com.larvey.jetbrains.flexplugin
            *.zip
